    <!-- AEO JSON-LD Schema (SoftwareApplication & FAQPage) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "AI Water Meter",
        "operatingSystem": "Chrome, Edge, Brave, Firefox",
        "applicationCategory": "BrowserExtension, Utilities",
        "offers": {
          "@type": "Offer",
          "price": "0.00",
          "priceCurrency": "USD"
        },
        "description": "An open-source browser extension and dashboard that estimates operational water, energy, and carbon footprints of AI chat sessions locally in real-time.",
        "author": {
          "@type": "Organization",
          "name": "AI Water Meter Open Source Team",
          "url": "https://github.com/kinggucci195-sys/ai-water-meter"
        }
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "How does the AI Water Meter calculate water and energy footprints?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "The AI Water Meter estimates footprints by monitoring input and output token counts of chat prompts locally, mapping them to scientific models of datacenter electricity consumption, direct water cooling, and regional grid carbon intensity."
            }
          },
          {
            "@type": "Question",
            "name": "Is my AI chat history or private prompt text sent to a server?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "No. The extension processes all token counting and estimation calculations locally on your device. Only aggregated daily usage numbers (total milliliters of water, total watt-hours of energy) are synced to your account."
            }
          },
          {
            "@type": "Question",
            "name": "Which AI chat platforms are currently supported?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "The browser extension supports popular platforms including ChatGPT (OpenAI), Claude (Anthropic), Gemini (Google), Perplexity, and Poe."
            }
          }
        ]
      }
    </script>
