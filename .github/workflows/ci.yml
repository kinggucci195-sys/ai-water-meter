name: AI Water Meter CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: TypeScript Typecheck
        run: npm run typecheck

      - name: Run Linter
        run: npm run lint

      - name: Run Jest Test Suite
        run: npm run test

      - name: Build and Package Extension
        run: npm run build
